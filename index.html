<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Combat Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0f14;
      --surface: #13161e;
      --surf2:   #1a1e2a;
      --border:  #2a2f40;
      --gold:    #c9a84c;
      --gold2:   #e8c96d;
      --red:     #c94c4c;
      --blue:    #3d87f5;
      --green:   #2cab21;
      --text:    #d8dae8;
      --dim:     #6a6f88;
      --glow:    rgba(201,168,76,0.2);
      --r:       12px;
      --fs:      17px;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: var(--fs);
      padding-bottom: 40px;
    }

    /* ══ WRAPPER ══ */
    #ctp-combat {
      position: relative !important;
      max-width: 900px !important;
      min-width: 0 !important;
      width: calc(100% - 24px) !important;
      margin: 20px auto !important;
      padding: 18px !important;
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: 18px !important;
      box-shadow: 0 0 60px rgba(0,0,0,.6) !important;
    }

    /* ══ TOPBAR — rebuilt by postInit() into .tracker-topbar ══ */
    .tracker-topbar {
      display: flex !important;
      align-items: center !important;
      justify-content: space-between !important;
      gap: 10px !important;
      flex-wrap: wrap !important;
    }
    .tracker-topbar-left  { display: flex !important; align-items: center !important; }
    .tracker-topbar-right {
      display: flex !important;
      align-items: center !important;
      gap: 8px !important;
      flex-wrap: wrap !important;
      /* neutralise JS inline position:absolute */
      position: static !important;
      top: auto !important;
      right: auto !important;
    }

    /* ══ BUTTONS ══ */
    #ctb-new, #combat-restart, #combat-reset-all, #combat-next {
      border-radius: var(--r) !important;
      font-family: 'Rajdhani', sans-serif !important;
      font-size: var(--fs) !important;
      font-weight: 700 !important;
      cursor: pointer !important;
      transition: filter .15s, transform .1s !important;
      white-space: nowrap !important;
      line-height: 1 !important;
      border: none !important;
      padding: 10px 18px !important;
      margin: 0 !important;
    }
    #ctb-new:active, #combat-restart:active,
    #combat-reset-all:active, #combat-next:active { transform: scale(.97) !important; }

    #ctb-new        { background: var(--green) !important; color: #fff !important; }
    #combat-restart  { background: var(--red)   !important; color: #fff !important; }
    #combat-next     { background: var(--blue)  !important; color: #fff !important; }
    #combat-reset-all {
      background: #3a0d0d !important;
      border: 1px solid #7a2020 !important;
      color: #ffaaaa !important;
    }
    #ctb-new:hover, #combat-restart:hover,
    #combat-next:hover         { filter: brightness(1.18) !important; }
    #combat-reset-all:hover    { filter: brightness(1.3)  !important; }

    /* ── turn badge ── */
    #ctp-combat span[style*="color"] {
      display: inline-flex !important;
      align-items: center !important;
      gap: 6px !important;
      background: var(--surf2) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--r) !important;
      padding: 8px 12px !important;
      color: var(--dim) !important;
      font-size: 12px !important;
      letter-spacing: 2px !important;
      text-transform: uppercase !important;
      white-space: nowrap !important;
    }
    #combat-turn {
      width: 48px !important;
      background: transparent !important;
      border: none !important;
      color: var(--gold2) !important;
      font-family: 'Cinzel', serif !important;
      font-size: 17px !important;
      font-weight: 600 !important;
      text-align: center !important;
      outline: none !important;
    }

    /* ══ LIST ══ */
    .ctr-list {
      color: var(--text) !important;
      margin-top: 14px !important;
      max-height: 62vh !important;
      overflow-y: auto !important;
      overflow-x: hidden !important;
      text-align: left !important;
      display: flex !important;
      flex-direction: column !important;
      gap: 6px !important;
      padding-right: 4px !important;
    }
    .ctr-list::-webkit-scrollbar       { width: 4px; }
    .ctr-list::-webkit-scrollbar-track { background: transparent !important; }
    .ctr-list::-webkit-scrollbar-thumb { background: var(--border) !important; border-radius: 4px !important; border: none !important; }

    /* ══ ROW — CSS grid
       col1: drag-handle
       col2: radio
       col3: name (flex)
       col4: iniciativa
       col5: vida
       col6: delete (spans both rows)
       row2: notes across cols 2-5
    ══ */
    .ctr-element {
      display: grid !important;
      grid-template-columns: 24px 22px 1fr 96px 96px auto !important;
      grid-template-rows: auto auto !important;
      align-items: center !important;
      column-gap: 8px !important;
      row-gap: 5px !important;
      background: var(--surf2) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--r) !important;
      padding: 10px 12px !important;
      transition: border-color .2s, box-shadow .2s !important;
      position: relative !important;
      white-space: normal !important;   /* allow wrap inside grid */
    }
    .ctr-element:hover { border-color: #3a3f52 !important; }
    .ctr-element.is-turn {
      border-color: var(--gold) !important;
      box-shadow: inset 0 0 24px rgba(201,168,76,.07), 0 0 0 1px rgba(201,168,76,.15) !important;
    }
    .ctr-element.is-turn .ctr-name { color: var(--gold2) !important; }
    .ctr-element.row-new { animation: fadeSlide .18s ease forwards; }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* .ctr-fixed-space dissolves into grid via display:contents */
    .ctr-fixed-space {
      display: contents !important;
      background: transparent !important;
      position: static !important;
      padding: 0 !important;
    }

    .drag-handle {
      grid-column: 1 !important;
      grid-row: 1 !important;
      color: var(--dim) !important;
      font-size: 18px !important;
      cursor: grab !important;
      transition: color .15s !important;
      line-height: 1 !important;
      padding: 0 !important;
      align-self: center !important;
      justify-self: center !important;
    }
    .ctr-element:hover .drag-handle { color: var(--gold) !important; }

    input[type="radio"].tracker-turn {
      grid-column: 2 !important;
      grid-row: 1 !important;
      appearance: none !important;
      -webkit-appearance: none !important;
      width: 18px !important;
      height: 18px !important;
      border: 2px solid var(--border) !important;
      border-radius: 50% !important;
      background: transparent !important;
      cursor: pointer !important;
      transition: all .15s !important;
      margin: 0 !important;
      align-self: center !important;
      justify-self: center !important;
      flex-shrink: 0 !important;
    }
    input[type="radio"].tracker-turn:checked {
      border-color: var(--gold) !important;
      background: var(--gold) !important;
      box-shadow: 0 0 10px var(--glow) !important;
    }

    /* shared input base */
    .ctr-name, .ctr-iniciativa, .ctr-vida, .ctr-notes {
      background: transparent !important;
      border: 1px solid transparent !important;
      border-radius: 8px !important;
      color: var(--text) !important;
      font-family: 'Rajdhani', sans-serif !important;
      font-size: var(--fs) !important;
      font-weight: 500 !important;
      padding: 5px 9px !important;
      outline: none !important;
      transition: border-color .15s, background .15s !important;
      min-width: 0 !important;
      width: 100% !important;
    }
    .ctr-name:focus, .ctr-iniciativa:focus,
    .ctr-vida:focus, .ctr-notes:focus {
      background: rgba(255,255,255,.04) !important;
      border-color: var(--gold) !important;
    }
    .ctr-name::placeholder, .ctr-iniciativa::placeholder,
    .ctr-vida::placeholder,  .ctr-notes::placeholder {
      color: var(--dim) !important; font-weight: 400 !important;
    }

    .ctr-name {
      grid-column: 3 !important; grid-row: 1 !important;
      font-weight: 600 !important;
    }
    .ctr-iniciativa {
      grid-column: 4 !important; grid-row: 1 !important;
      text-align: center !important;
    }
    .ctr-vida {
      grid-column: 5 !important; grid-row: 1 !important;
      text-align: center !important;
    }
    /* notes: row 2, spans from radio col to before delete */
    .ctr-notes {
      grid-column: 2 / 6 !important; grid-row: 2 !important;
      font-size: 14px !important;
    }

    /* delete: col 6, spans both rows — always on the right */
    .ctr-delete {
      grid-column: 6 !important; grid-row: 1 / 3 !important;
      align-self: center !important;
      background: var(--red) !important;
      border: none !important;
      border-radius: 8px !important;
      color: #fff !important;
      font-family: 'Rajdhani', sans-serif !important;
      font-size: 15px !important;
      font-weight: 700 !important;
      padding: 8px 12px !important;
      cursor: pointer !important;
      transition: filter .15s !important;
      z-index: auto !important;
      line-height: 1 !important;
      white-space: nowrap !important;
    }
    .ctr-delete:hover { filter: brightness(1.25) !important; }

    /* ══ SORTABLE ══ */
    .ui-sortable-helper {
      opacity: .88 !important;
      box-shadow: 0 10px 40px rgba(0,0,0,.7) !important;
      border-color: var(--gold) !important;
      display: grid !important;
    }
    .ui-sortable-placeholder {
      border: 2px dashed rgba(201,168,76,.4) !important;
      border-radius: var(--r) !important;
      background: rgba(201,168,76,.04) !important;
      visibility: visible !important;
      min-height: 54px !important;
    }

    /* ══ RESPONSIVE ══ */
    @media (max-width: 640px) {
      :root { --fs: 15px; }

      #ctp-combat {
        width: calc(100% - 12px) !important;
        padding: 14px 12px !important;
        border-radius: 14px !important;
      }

      #ctb-new, #combat-restart, #combat-reset-all, #combat-next {
        padding: 9px 13px !important;
        font-size: 14px !important;
      }

      /* tighter num columns on small screens */
      .ctr-element {
        grid-template-columns: 22px 20px 1fr 72px 72px auto !important;
        column-gap: 5px !important;
      }

      .ctr-notes { font-size: 13px !important; }
    }

    @media (max-width: 400px) {
      .ctr-element {
        grid-template-columns: 18px 18px 1fr 60px 60px auto !important;
        column-gap: 4px !important;
        padding: 8px !important;
      }
      .drag-handle { font-size: 15px !important; }
    }
  </style>
</head>
<body>
<script>
$(document).ready(function () {
  const buttonStyle = 'z-index:99;background-color:rgb(61,135,245);padding:10px;color:white;border-radius:10px;border:none;cursor:pointer;';
  const buttonClasses = 'button-text button button-flex clickable dark';
  const data = init();

  // ── postInit: neutralise position:absolute on controls div
  //    and build a proper flex topbar ────────────────────────
  (function postInit() {
    const $new      = $('#ctb-new');
    const $ctrlDiv  = $('#ctp-combat > div[style*="absolute"]');

    const $topbar = $('<div class="tracker-topbar"></div>');
    const $left   = $('<div class="tracker-topbar-left"></div>').append($new);
    const $right  = $('<div class="tracker-topbar-right"></div>').append($ctrlDiv.children());

    $ctrlDiv.remove();
    $topbar.append($left).append($right);
    $('#ctp-combat').prepend($topbar);
  })();

  let isDragging = false;

  // ── sortable (init once) ──────────────────────────────────
  function initSortable() {
    $(".ctr-list").sortable({
      handle: '.drag-handle',
      placeholder: 'ui-sortable-placeholder',
      tolerance: 'pointer',
      start: function (e, ui) {
        isDragging = true;
        saveData();
        ui.item.attr('data-drag-origin', ui.item.data('idx'));
        if (+ui.item.data('idx') === data.combat.hasTurn) {
          ui.item.addClass('is-turn');
          if (ui.helper) ui.helper.addClass('is-turn');
        }
      },
      stop: function () {
        isDragging = false;
        const activeTracker = data.combat.trackers[data.combat.hasTurn];
        const newOrder = [];
        $(".ctr-element[data-idx]").each(function () {
          const origIdx = +$(this).data('idx');
          if (data.combat.trackers[origIdx] !== undefined)
            newOrder.push(data.combat.trackers[origIdx]);
        });
        data.combat.trackers = newOrder;
        const newActive = newOrder.indexOf(activeTracker);
        data.combat.hasTurn = newActive >= 0 ? newActive : 0;
        applyTurnClass();
        reassignIdx();
        saveData();
      }
    });
  }

  // ── smart render (no full DOM wipe) ──────────────────────
  function renderTracker() {
    const list  = $(".ctr-list");
    const count = data.combat.trackers.length;
    const rows  = list.children(".ctr-element");

    // add missing
    for (let i = rows.length; i < count; i++) {
      const $el = makeRow(i, data.combat.trackers[i]);
      $el.addClass('row-new');
      list.append($el);
    }
    // remove extra (from end)
    for (let i = rows.length - 1; i >= count; i--)
      list.children(".ctr-element").eq(i).remove();

    // update values without touching DOM structure
    list.children(".ctr-element").each(function (i) {
      const pj = data.combat.trackers[i];
      if (!pj) return;
      const $el = $(this);
      $el.data('idx', i).attr('data-idx', i);
      $el.find('input[name="turn"]').val(i);
      if (!$el.find(".ctr-name").is(':focus'))       $el.find(".ctr-name").val(pj.name);
      if (!$el.find(".ctr-iniciativa").is(':focus')) $el.find(".ctr-iniciativa").val(pj.status.iniciativa);
      if (!$el.find(".ctr-vida").is(':focus'))       $el.find(".ctr-vida").val(pj.status.vida);
      if (!$el.find(".ctr-notes").is(':focus'))      $el.find(".ctr-notes").val(pj.notes);
      $el.find(".ctr-delete").attr('index', i);
    });

    applyTurnClass();
    bindRowEvents();
  }

  function makeRow(i, pj) {
    return $(`
      <div class="ctr-element" data-idx="${i}">
        <div class="ctr-fixed-space" style="display:inline-block;padding:1px;position:sticky;left:0;">
          <span class="drag-handle" style="cursor:grab;padding-right:10px;">&#9776;</span>
          <input type="radio" class="tracker-turn" name="turn" value="${i}">
          <input type="text" class="ctr-name" placeholder="Nombre" value="${esc(pj.name)}"/>
        </div>
        <input type="text" class="ctr-iniciativa" placeholder="Init" value="${esc(pj.status.iniciativa)}"/>
        <input type="text" class="ctr-vida" placeholder="HP" value="${esc(pj.status.vida)}"/>
        <input type="text" class="ctr-notes" placeholder="Notas…" value="${esc(pj.notes)}"/>
        <button style="${buttonStyle}padding:8px;background-color:rgb(255,54,51);padding-top:4px;padding-bottom:4px;display:inline-block;"
                class="ctr-delete ${buttonClasses}" index="${i}">✕</button>
      </div>`);
  }

  function applyTurnClass() {
    if (isDragging) return;
    $(".ctr-element").each(function (i) {
      $(this).toggleClass('is-turn', i === data.combat.hasTurn);
      $(this).find('input[name="turn"]').prop('checked', i === data.combat.hasTurn);
    });
  }

  function reassignIdx() {
    $(".ctr-element").each(function (i) {
      $(this).data('idx', i).attr('data-idx', i);
      $(this).find('input[name="turn"]').val(i);
      $(this).find('.ctr-delete').attr('index', i);
    });
  }

  function bindRowEvents() {
    $(".ctr-delete").off('click').on('click', function (e) {
      e.stopPropagation();
      saveData();
      const index = +$(this).attr('index');
      if (data.combat.hasTurn === index) data.combat.hasTurn = 0;
      else if (data.combat.hasTurn > index) data.combat.hasTurn--;
      data.combat.trackers.splice(index, 1);
      $(this).closest('.ctr-element').remove();
      renderTracker();
      saveData();
    });

    $(".tracker-turn").off('click').on('click', function () {
      data.combat.hasTurn = +$(this).val();
      applyTurnClass();
    });
  }

  function saveData() {
    $(".ctr-element").each(function (i) {
      data.combat.trackers[i] = {
        name:   $(this).find(".ctr-name").val()        || '',
        status: {
          vida:       $(this).find(".ctr-vida").val()       || '',
          iniciativa: $(this).find(".ctr-iniciativa").val() || ''
        },
        notes:  $(this).find(".ctr-notes").val()       || ''
      };
    });
    data.combat.turn = +$('#combat-turn').val() || 0;
    data.notes = $('#cti-notes').val() || '';
    localStorage.setItem('rpg-data', JSON.stringify(data));
  }

  function clickEvents() {
    $('#combat-restart').click(() => {
      saveData();
      data.combat.hasTurn = 0;
      data.combat.turn    = 0;
      $('#combat-turn').val(0);
      renderTracker();
      saveData();
    });

    $('#combat-reset-all').click(() => {
      data.combat.trackers = [newTracker()];
      data.combat.hasTurn  = 0;
      data.combat.turn     = 0;
      $('#combat-turn').val(0);
      renderTracker();
      saveData();
    });

    $("#combat-next").click(() => {
      saveData();
      if (data.combat.hasTurn === data.combat.trackers.length - 1) {
        data.combat.hasTurn = 0;
        data.combat.turn++;
        $('#combat-turn').val(data.combat.turn);
      } else {
        data.combat.hasTurn++;
      }
      applyTurnClass();
      saveData();
    });

    $('#ctb-new').click(() => {
      saveData();
      data.combat.trackers.push(newTracker());
      renderTracker();
      saveData();
      setTimeout(() => {
        const list = $(".ctr-list")[0];
        if (list) list.scrollTop = list.scrollHeight;
      }, 50);
    });
  }

  function newTracker() {
    return { name: '', status: { vida: '', iniciativa: '' }, notes: '' };
  }
  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;');
  }

  function init() {
    let loadedData;
    try { loadedData = JSON.parse(localStorage.getItem('rpg-data')); } catch(e) {}
    const d = loadedData || {
      combat: { turn: 0, hasTurn: 0, trackers: [newTracker(), newTracker(), newTracker()] },
      notes: ''
    };
    $('body').append(`
      <div id="ctp-combat" style="position:relative;max-width:725px;min-width:280px;width:-webkit-fill-available;width:-moz-fill-available;">
        <button class="${buttonClasses}" style="${buttonStyle}padding-top:7px;padding-bottom:7px;margin-right:20px;background-color:rgb(44,171,33);display:inline-block;" id="ctb-new">+</button>
        <div style="position:absolute;right:20px;top:7px;">
          <button id="combat-restart"  style="${buttonStyle}margin-right:10px;padding-top:7px;padding-bottom:7px;display:inline-block;background-color:rgb(255,54,51);"  class="${buttonClasses}">Reset</button>
          <button id="combat-reset-all" style="${buttonStyle}margin-right:10px;padding-top:7px;padding-bottom:7px;display:inline-block;background-color:rgb(120,30,30);" class="${buttonClasses}">Reset All</button>
          <span style="color:#000000bd;">Turn: <input type="number" style="width:50px;" id="combat-turn" value="${d.combat.turn}" placeholder="Turno"></span>
          <button id="combat-next" style="${buttonStyle}margin-left:10px;padding-top:7px;padding-bottom:7px;display:inline-block;" class="${buttonClasses}">Siguiente</button>
        </div>
        <div style="color:#000000bd;margin-top:20px;max-height:300px;overflow:auto;text-align:center;" class="ctr-list"></div>
      </div>`
    );
    return d;
  }

  renderTracker();
  initSortable();
  clickEvents();
  setInterval(saveData, 3000);
});
</script>
</body>
</html>
